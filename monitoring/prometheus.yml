global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'analytics-api'
    static_configs:
      - targets: ['analytics-api:8000']

  - job_name: 'forecasting-service'
    static_configs:
      - targets: ['forecasting-service:8001']

  - job_name: 'anomaly-detection'
    static_configs:
      - targets: ['anomaly-detection:8002']