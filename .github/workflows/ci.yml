name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.services.txt
          pip install pytest pytest-cov ruff httpx pyyaml
          pip install kafka-python==2.3.1 || pip install kafka-python-ng || true

      - name: Lint with ruff
        run: ruff check . --select E,F,W,I --ignore E501

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --tb=short \
            --cov=services \
            --cov=messaging \
            --cov=data \
            --cov-report=term-missing \
            --cov-report=xml \
            --ignore=tests/test_spark_jobs.py
        env:
          DATABASE_URL: sqlite:///./test.db
          KAFKA_BROKERS: localhost:9092

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.11'
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install mypy
        run: |
          pip install mypy fastapi pydantic sqlalchemy types-PyYAML

      - name: Type check services
        run: mypy services/ --ignore-missing-imports --no-error-summary
        continue-on-error: true
