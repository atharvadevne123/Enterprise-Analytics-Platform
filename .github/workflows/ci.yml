name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install -r requirements.services.txt || true
          pip install scikit-learn statsmodels scipy
          pip install pytest pytest-cov ruff httpx pyyaml
          pip install kafka-python-ng || pip install kafka-python || true
          pip install "tomli>=2.0" || true

      - name: Lint with ruff (using pyproject.toml config)
        run: |
          ruff check .
          ruff format --check .

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --tb=short \
            --cov=services \
            --cov=messaging \
            --cov=data \
            --cov-report=term-missing \
            --cov-report=xml \
            --ignore=tests/test_spark_jobs.py
        env:
          DATABASE_URL: sqlite:///./test.db
          KAFKA_BROKERS: localhost:9092

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: matrix.python-version == '3.11'
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install mypy and stubs
        run: |
          pip install mypy fastapi pydantic sqlalchemy types-PyYAML numpy

      - name: Type check services
        run: mypy services/ --ignore-missing-imports --no-error-summary
        continue-on-error: true

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Run bandit security scan
        run: bandit -r services/ messaging/ data/ -ll --exit-zero
